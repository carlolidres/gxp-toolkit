# GxP Toolkit — Supabase local/remote project config
# https://supabase.com/docs/guides/cli/config

project_id = "gxp-toolkit-vrms"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "https://carlolidres.github.io/gxp-toolkit/"
additional_redirect_urls = [
  "http://localhost:5173/**",
  "http://127.0.0.1:5173/**",
  "https://carlolidres.github.io/gxp-toolkit/**",
]
enable_signup = true

[auth.email]
enable_signup = true
enable_confirmations = false
